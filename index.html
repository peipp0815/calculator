<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="js.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="calculator">
        <p class="display"></p>
        <div class="buttons">
          <div class="extra">
            <button id="clear" class="btn">AC</button>
            <button id="backspace" class="btn">CE</button>
          </div>
          <div class="numbersOperators">
            <div class="numPad">
              <div class="top">
                <button id="seven" class="btn numbers">7</button>
                <button id="eight" class="btn numbers">8</button>
                <button id="nine" class="btn numbers">9</button>
              </div>
              <div class="middle">
                <button id="four" class="btn numbers">4</button>
                <button id="five" class="btn numbers">5</button>
                <button id="six" class="btn numbers">6</button>
              </div>
              <div class="bottom">
                <button id="one" class="btn numbers">1</button>
                <button id="two" class="btn numbers">2</button>
                <button id="three" class="btn numbers">3</button>
              </div>
              <div class="below">
                <button id="zero" class="btn numbers">0</button>
                <button id="dot" class="btn numbers">.</button>
              </div>
            </div>
            <div class="operatorsAndResult">
              <button id="addition" class="btn operators">+</button>
              <button id="subtraction" class="btn operators">-</button>
              <button id="multiplication" class="btn operators">*</button>
              <button id="division" class="btn operators">/</button>
              <button id="result" class="btn operators">=</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
